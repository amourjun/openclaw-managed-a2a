name: Bug Report
description: Report a defect, regression, or compatibility failure.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this template for defects, regressions, or operator-visible failures.
        If the issue may expose a security problem, use the process in SECURITY.md instead of filing it publicly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the failure.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OpenClaw version, OS, plugin config, and any relevant adapter context.
      placeholder: |
        OpenClaw:
        OS:
        Adapter:
        Plugin config:
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Exact steps or commands needed to reproduce.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility Notes
      description: Note whether this looks related to an OpenClaw version change, adapter fallback, or internal shim behavior.
  - type: textarea
    id: logs
    attributes:
      label: Logs or Diagnostics
      description: Paste the shortest relevant log excerpt or validation output.
      render: shell
