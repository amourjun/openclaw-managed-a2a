name: Publish npm

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: "npm dist-tag to publish under"
        required: false
        default: "alpha"
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate repository
        run: npm run ci

      - name: Resolve npm dist-tag
        id: dist_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.dist_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            echo "value=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public --tag "${{ steps.dist_tag.outputs.value }}"
